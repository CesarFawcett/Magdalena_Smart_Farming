<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magdalena Smart Farming | Acceso</title>
    <meta name="description" content="Acceda al sistema de agricultura de precisión de Magdalena Smart Farming. Tecnología de vanguardia para su cultivo." />
  </head>
  <body>
    <div id="app">
      <div class="login-container">
        <main class="login-card">
          <div class="logo-container">
            <img src="/logo.png" alt="Magdalena Logo" id="magdalena-logo" />
          </div>
          <h1 class="brand-title">Magdalena</h1>
          <p class="brand-subtitle">Bienvenido a la Precisión</p>

          <form id="login-form">
            <div class="form-group">
              <label for="email">Correo Electrónico</label>
              <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="nombre@magdalena.ag" 
                required 
                autocomplete="email"
              />
            </div>
            <div class="form-group">
              <label for="password">Contraseña</label>
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="••••••••" 
                required 
                autocomplete="current-password"
              />
            </div>
            <button type="submit" class="btn-primary" id="btn-login">
              Acceder al Sistema
            </button>
          </form>

          <!-- Forgot Password Form (Hidden by default) -->
          <form id="forgot-password-form" class="hidden">
            <h2 class="form-title">Recuperar Acceso</h2>
            <p class="form-description">Ingresa tu correo y te enviaremos instrucciones.</p>
            <div class="form-group">
              <label for="forgot-email">Correo Electrónico</label>
              <input 
                type="email" 
                id="forgot-email" 
                name="email" 
                placeholder="nombre@magdalena.ag" 
                required
              />
            </div>
            <button type="submit" class="btn-primary" id="btn-reset">
              Enviar Instrucciones
            </button>
            <button type="button" class="btn-link" id="btn-back-to-login">
              Volver al inicio
            </button>
          </form>

          <div class="login-footer-links" id="login-links">
            <a href="#" class="link-subtle" id="link-forgot-password">Olvidé mi contraseña</a>
            <div class="divider"></div>
            <a href="#" class="support-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Contactar soporte
            </a>
          </div>
        </main>
      </div>

      <footer class="page-footer">
        <p>© 2026 MAGDALENA SMART FARMING. PRECISION IN EVERY SEED.</p>
        <nav class="footer-nav">
          <a href="#">Compliance</a>
          <a href="#">Global Offices</a>
        </nav>
      </footer>

      <div class="status-widget">
        <div class="status-dot"></div>
        <div class="status-text">
          <span class="status-label">Estado del Sistema</span>
          <span class="status-detail">OPERACIONAL • 99.9% PRECISIÓN</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
