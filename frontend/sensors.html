<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magdalena | Gestión de Sensores</title>
    <link rel="stylesheet" href="/src/dashboard.css">
    <link rel="stylesheet" href="/src/sensors.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/logo.png" alt="Magdalena Logo" class="sidebar-logo">
                <div class="brand-info">
                    <span class="brand-name">Magdalena</span>
                    <span class="brand-tagline">Smart Farming</span>
                    <span class="user-status">Productor Activo</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Tablero
                </a>
                <a href="/analysis.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    Análisis de Cultivos
                </a>
                <a href="/sensors.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.58 16.14a7 7 0 0 1 6.84 0"></path><circle cx="12" cy="20" r="2"></circle></svg>
                    Gestión de Sensores
                </a>
                <a href="/sync.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    Centro de Sincronización
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="btn-logout" class="footer-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <span class="breadcrumb">Magdalena Smart Farming / Gestión</span>
                    <h1>Nodos y Telemetría</h1>
                </div>

                <div class="top-bar-actions">
                    <div class="status-indicator rabbitmq">
                        <span class="status-icon"></span>
                        RABBITMQ
                    </div>
                    <div class="status-indicator localdb">
                        <span class="status-icon"></span>
                        LOCALDB
                    </div>
                    <button class="notification-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="notif-badge"></span>
                    </button>
                    <div class="user-profile">
                        <span class="user-name" id="user-display-name">Admin</span>
                        <button id="btn-open-profile" class="profile-icon-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="filters-bar">
                        <div class="filter-group">
                            <label>Filtrar por Cultivo</label>
                            <div class="select-field">
                                <select id="filter-parcela">
                                    <option value="all">Todos los Cultivos</option>
                                </select>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label>Estado</label>
                            <div class="select-field">
                                <select id="filter-status">
                                    <option value="all">Todos los Estados</option>
                                    <option value="Activo">En Línea</option>
                                    <option value="Inactivo">Fuera de Servicio</option>
                                    <option value="Mantenimiento">Mantenimiento</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <div class="simulation-controls">
                            <select id="sim-interval">
                                <option value="5">Cada 5 segundos</option>
                                <option value="30">Cada 30 segundos</option>
                                <option value="60">Cada 1 minuto</option>
                                <option value="3600">Cada 1 hora</option>
                                <option value="86400">Cada 1 día</option>
                            </select>
                            <button class="btn-simulate" id="btn-simulate">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                                Simular Datos
                            </button>
                            <button class="btn-clear" id="btn-clear-sensors">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                Limpiar Sensores
                            </button>
                        </div>
                        <button class="btn-primary" id="btn-add-sensor">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Añadir Sensor
                        </button>
                    </div>
                </div>

                <!-- Sensors Grid -->
                <div class="sensors-grid" id="sensors-grid">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Adding Sensor -->
    <div id="sensor-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Configurar Nuevo Sensor</h2>
                <button id="close-sensor-modal" class="close-btn">&times;</button>
            </div>
            <form id="sensor-form">
                <div class="form-group" id="group-nombre">
                    <label for="sensor-nombre">Nombre del Dispositivo</label>
                    <input type="text" id="sensor-nombre" name="nombre" placeholder="Ej. Nodo Humedad 05" required>
                </div>
                <div class="form-row" id="group-tipo-unidad">
                    <div class="form-group">
                        <label for="sensor-tipo">Tipo de Sensor</label>
                        <select id="sensor-tipo" name="tipo" required>
                            <option value="Humedad">Humedad de Suelo</option>
                            <option value="pH">Potencial Hidrógeno (pH)</option>
                            <option value="Temperatura">Temperatura Ambiente</option>
                            <option value="Clima">Probabilidad de Lluvia</option>
                            <option value="Viento">Velocidad del Viento</option>
                            <option value="Multiparamétrico">Multiparamétrico</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sensor-unidad">Unidad de Medida</label>
                        <input type="text" id="sensor-unidad" name="unidad" placeholder="Ej. %, pH, °C" required>
                    </div>
                </div>
                <div class="form-group" id="group-parcelas">
                    <label for="sensor-parcelas">Asignar a Parcelas (Mantén Ctrl para seleccionar varias)</label>
                    <select id="sensor-parcelas" name="parcelaIds" multiple required class="multi-select">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group" id="group-modo">
                    <label for="sensor-modo">Modo de Operación Inicial</label>
                    <div class="mode-options">
                        <label class="radio-label">
                            <input type="radio" name="modoOperacion" value="ENCENDIDO" checked> 
                            <span>Automático</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="modoOperacion" value="MANUAL"> 
                            <span>Manual</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="modoOperacion" value="APAGADO"> 
                            <span>Apagado</span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancel-sensor-btn">Cancelar</button>
                    <button type="submit" class="btn-primary-modal">Guardar Dispositivo</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for User Profile -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configuración de Perfil</h2>
                <button id="close-profile-modal" class="close-btn">&times;</button>
            </div>
            <form id="profile-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="profile-email" name="email" placeholder="usuario@magdalena.com">
                </div>
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <div class="password-field">
                        <input type="password" id="profile-password" name="password" placeholder="••••••••">
                        <button type="button" class="toggle-password" data-target="profile-password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <div class="password-field">
                        <input type="password" id="profile-confirm-password" placeholder="••••••••">
                        <button type="button" class="toggle-password" data-target="profile-confirm-password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancel-profile-btn">Cancelar</button>
                    <button type="submit" class="btn-primary-modal">Actualizar Credenciales</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Global Notifications & EDA -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/src/notifications.js"></script>

    <script type="module" src="/src/sensors.js"></script>
</body>
</html>
